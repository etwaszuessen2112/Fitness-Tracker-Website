<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0c12">
<link rel="manifest" href="manifest.json">
<title>💪 Trainings-Tracker</title>
<style>
:root{
  --bg:#0a0c12;--bg2:#10131d;--bg3:#161923;--bg4:#1c2030;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#eef0f8;--muted:#5a6080;--muted2:#8890b0;
  --upper:#5b8fff;--upper-bg:rgba(91,143,255,0.1);
  --lower:#a78bfa;--lower-bg:rgba(167,139,250,0.1);
  --run:#34d399;--run-bg:rgba(52,211,153,0.1);
  --mob:#fbbf24;--mob-bg:rgba(251,191,36,0.1);
  --danger:#f87171;--r:10px;
  --font:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100%;padding-bottom:80px;overflow-x:hidden}
input,select,button,textarea{font-family:var(--font);-webkit-appearance:none;appearance:none}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(10,12,18,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;height:52px;gap:2px}
.nav-brand{font-size:15px;font-weight:700;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--upper),var(--run));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-right:6px;white-space:nowrap}
.nav-divider{width:1px;height:20px;background:var(--border2);margin:0 4px;flex-shrink:0}
.nav-btn{background:none;border:none;color:var(--muted2);font-size:12px;font-weight:500;padding:6px 9px;border-radius:7px;cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.01em}
.nav-btn:hover{color:var(--text);background:var(--bg4)}
.nav-btn.on{color:var(--text);background:var(--bg3);border:1px solid var(--border2)}
.nav-timer-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--mob);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;margin-left:4px;flex-shrink:0;letter-spacing:.02em}
.nav-timer-btn:hover{background:var(--mob-bg);border-color:var(--mob)}
.nav-timer-btn.running{color:var(--danger);border-color:var(--danger);background:rgba(248,113,113,0.1);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.nav-scroll{display:flex;align-items:center;flex:1;overflow-x:auto;gap:2px;scrollbar-width:none;-ms-overflow-style:none}
.nav-scroll::-webkit-scrollbar{display:none}

/* PAGES */
.page{display:none;padding:68px 16px 16px;max-width:760px;margin:0 auto;animation:fadeIn .2s ease}
.page.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* TIMER OVERLAY */
.timer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.timer-box{background:var(--bg2);border:1px solid var(--border2);border-radius:24px;padding:32px 28px;text-align:center;width:min(320px,90vw)}
.timer-label{font-size:11px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.timer-display{font-size:72px;font-weight:800;letter-spacing:-4px;color:var(--text);font-variant-numeric:tabular-nums;margin-bottom:8px;line-height:1}
.timer-display.danger-color{color:var(--danger)}
.timer-display.done-color{color:var(--run)}
.timer-progress{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:20px}
.timer-progress-fill{height:100%;border-radius:3px;transition:width .5s linear;background:linear-gradient(90deg,var(--run),var(--upper))}
.timer-progress-fill.danger-fill{background:var(--danger)}
.timer-presets{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;justify-content:center}
.timer-preset{background:var(--bg4);border:1px solid var(--border);color:var(--muted2);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.timer-preset:hover{border-color:var(--border2);color:var(--text)}
.timer-preset.active{border-color:var(--mob);color:var(--mob);background:var(--mob-bg)}
.timer-controls{display:flex;gap:8px;justify-content:center}
.timer-ctrl{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;flex:1}
.timer-ctrl:hover{background:var(--bg4)}
.timer-ctrl.primary{background:var(--run-bg);border-color:var(--run);color:var(--run)}
.timer-ctrl.primary:hover{background:rgba(52,211,153,0.18)}
.timer-close{position:absolute;top:16px;right:16px;background:var(--bg3);border:1px solid var(--border);color:var(--muted2);border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.card-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* BADGES */
.badge{font-size:10px;font-weight:700;letter-spacing:.04em;padding:3px 9px;border-radius:20px;text-transform:uppercase}
.b-upper{background:var(--upper-bg);color:var(--upper);border:1px solid rgba(91,143,255,0.2)}
.b-lower{background:var(--lower-bg);color:var(--lower);border:1px solid rgba(167,139,250,0.2)}
.b-run{background:var(--run-bg);color:var(--run);border:1px solid rgba(52,211,153,0.2)}
.b-mob{background:var(--mob-bg);color:var(--mob);border:1px solid rgba(251,191,36,0.2)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;margin-bottom:16px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 10px;text-align:center}
.stat-n{font-size:22px;font-weight:700;letter-spacing:-1px;color:var(--text)}
.stat-l{font-size:10px;color:var(--muted2);margin-top:2px;font-weight:500;letter-spacing:.03em}

/* WEEK GRID */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px}
.wday{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s}
.wday:hover{border-color:var(--border2);background:var(--bg4)}
.wday.done{border-color:var(--run)!important;background:var(--run-bg)}
.wday.selected{border-color:var(--upper);background:var(--upper-bg)}
.wday-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;font-weight:600}
.wday-type{font-size:9px;font-weight:700;margin-bottom:5px;min-height:12px}
.wday-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);margin:0 auto}
.wday.done .wday-dot{background:var(--run)}

/* EXERCISE TABLE */
.ex-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px}
.ex-table{width:100%;border-collapse:collapse;min-width:320px}
.ex-table th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:0 8px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border)}
.ex-table th:not(:first-child){text-align:center}
.ex-table td{padding:9px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.ex-table tr:last-child td{border-bottom:none}
.ex-table td:not(:first-child){text-align:center}
.ex-name{font-size:13px;font-weight:500;color:var(--text)}
.ex-target{font-size:10px;color:var(--muted2);margin-top:2px;font-weight:500}
.ex-note{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3}
input.val{background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;width:56px;padding:6px 4px;text-align:center;transition:border-color .15s;outline:none}
input.val:focus{border-color:var(--upper)}
input.val.has-val{border-color:rgba(91,143,255,0.3);background:rgba(91,143,255,0.06)}

/* RING */
.ring-wrap{position:relative;width:80px;height:80px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-n{font-size:18px;font-weight:700;color:var(--text);line-height:1}
.ring-l{font-size:9px;color:var(--muted2);margin-top:2px;font-weight:500}

/* DONE BTN */
.done-btn{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:10px;color:var(--muted2);font-size:13px;font-weight:600;padding:12px;cursor:pointer;margin-top:14px;transition:all .2s;letter-spacing:.01em;display:flex;align-items:center;justify-content:center;gap:6px}
.done-btn:hover{border-color:var(--run);color:var(--run);background:var(--run-bg)}
.done-btn.marked{background:var(--run-bg);border-color:var(--run);color:var(--run)}

/* RUN */
.run-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
@media(max-width:400px){.run-grid{grid-template-columns:1fr 1fr}}
.run-field label{font-size:10px;color:var(--muted2);display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.run-field input{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:16px;padding:10px 12px;font-weight:600;transition:border-color .15s;outline:none}
.run-field input:focus{border-color:var(--run)}
.run-field input.has-val{border-color:rgba(52,211,153,0.3);background:rgba(52,211,153,0.05)}
.pace-display{background:linear-gradient(135deg,var(--run-bg),rgba(52,211,153,0.05));border:1px solid rgba(52,211,153,0.2);border-radius:12px;padding:14px;text-align:center;margin:12px 0}
.pace-label{font-size:10px;color:var(--run);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.pace-value{font-size:30px;font-weight:800;color:var(--run);letter-spacing:-1px}
.pace-unit{font-size:12px;color:var(--muted2);margin-top:2px;font-weight:500}
.pace-bar-wrap{margin-top:10px}
.pace-bar-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px}
.pace-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.pace-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--run),var(--upper));transition:width .5s ease}
.feel-row{display:flex;gap:6px;margin-top:8px}
.feel-btn{flex:1;background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--muted2);font-size:14px;padding:8px;cursor:pointer;transition:all .15s;text-align:center}
.feel-btn:hover{border-color:var(--border2);color:var(--text)}
.feel-btn.on{border-color:var(--run);background:var(--run-bg);color:var(--run)}

/* MOBILITY */
.mob-list{display:flex;flex-direction:column;gap:8px}
.mob-item{display:flex;align-items:center;gap:12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s}
.mob-item:hover{border-color:var(--border2)}
.mob-item.checked{border-color:var(--mob);background:var(--mob-bg)}
.mob-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .15s;color:transparent}
.mob-item.checked .mob-check{background:var(--mob);border-color:var(--mob);color:#000}
.mob-name{font-size:13px;font-weight:500;color:var(--text)}
.mob-meta{font-size:11px;color:var(--muted2);margin-top:1px}

/* PREV */
.prev-header{display:flex;align-items:center;gap:6px;margin:16px 0 10px}
.prev-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.prev-badge{font-size:10px;background:var(--bg4);border:1px solid var(--border);color:var(--muted2);padding:2px 8px;border-radius:10px}
.prev-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.prev-row:last-child{border-bottom:none}
.prev-key{color:var(--muted2)}
.prev-val{color:var(--text);font-weight:600;font-variant-numeric:tabular-nums}
.pr-tag{font-size:9px;background:rgba(251,191,36,0.15);color:var(--mob);border:1px solid rgba(251,191,36,0.2);padding:1px 6px;border-radius:8px;margin-left:5px;font-weight:700}

/* WEEK PAGE */
.week-sel{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.week-nav{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.week-nav:hover{background:var(--bg4);border-color:var(--border2)}
.week-nav:disabled{opacity:.3;cursor:not-allowed}
.week-label{font-size:14px;font-weight:600;flex:1;text-align:center}
.prog-wrap{margin-bottom:6px}
.prog-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--muted2);margin-bottom:6px;font-weight:500}
.prog-bar{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .5s ease}
.day-summary-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px}
.day-summary-card:hover{border-color:var(--border2);background:var(--bg3)}
.day-summary-card.done-card{border-color:rgba(52,211,153,0.25);background:rgba(52,211,153,0.04)}
.day-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.day-info{flex:1;min-width:0}
.day-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.day-sub{font-size:11px;color:var(--muted2)}
.day-status{font-size:11px;color:var(--run);font-weight:600;white-space:nowrap}

/* STATS PAGE */
.stats-big-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-big{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px}
.stat-big-n{font-size:34px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:4px}
.stat-big-l{font-size:12px;color:var(--muted2);font-weight:500}
.stat-big-sub{font-size:11px;color:var(--muted);margin-top:4px}
.pr-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.pr-item:last-child{border-bottom:none}
.pr-name{font-size:13px;color:var(--text);font-weight:500;flex:1}
.pr-val{font-size:14px;font-weight:700;color:var(--upper);font-variant-numeric:tabular-nums}
.pr-bar-wrap{flex:1.5}
.mini-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.mini-fill{height:100%;border-radius:2px;background:var(--upper)}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:80px;margin-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-inner{width:100%;border-radius:4px 4px 0 0;background:var(--upper-bg);border:1px solid rgba(91,143,255,0.15);min-height:2px}
.bar-inner.filled{background:linear-gradient(180deg,var(--upper),rgba(91,143,255,0.4))}
.bar-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:600}

/* LOG PAGE */
.log-entry{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.log-date{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.log-when{font-size:11px;color:var(--muted2);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.log-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.log-row:last-child{border-bottom:none}
.log-key{color:var(--muted2)}
.log-val{color:var(--text);font-weight:600;font-variant-numeric:tabular-nums}

/* SETTINGS */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);gap:12px}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:14px;color:var(--text);font-weight:500}
.settings-sub{font-size:11px;color:var(--muted2);margin-top:2px}
.settings-btn{background:var(--bg4);border:1px solid var(--border);color:var(--upper);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.settings-btn:hover{border-color:var(--upper);background:var(--upper-bg)}
.danger-btn{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);color:var(--danger);border-radius:9px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.danger-btn:hover{background:rgba(248,113,113,0.18);border-color:rgba(248,113,113,0.35)}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:500;color:var(--text);z-index:999;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;backdrop-filter:blur(20px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MISC */
.slabel{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin:0 0 8px}
.phase-banner{background:linear-gradient(135deg,var(--upper-bg),var(--lower-bg));border:1px solid rgba(91,143,255,0.15);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.phase-icon{font-size:20px}
.phase-text{font-size:13px;font-weight:600;color:var(--text)}
.phase-sub{font-size:11px;color:var(--muted2);margin-top:1px}
.empty{text-align:center;color:var(--muted);padding:32px 0;font-size:13px}

@media(max-width:480px){.stats-big-grid{grid-template-columns:1fr 1fr}.stat-big-n{font-size:28px}.week-grid .wday-type{display:none}.nav-brand{font-size:13px}}
@media(max-width:360px){.stats-big-grid{grid-template-columns:1fr}.run-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <span class="nav-brand">💪 Trainer</span>
  <div class="nav-divider"></div>
  <div class="nav-scroll">
    <button class="nav-btn on" onclick="showPage('today')">Heute</button>
    <button class="nav-btn" onclick="showPage('week')">Woche</button>
    <button class="nav-btn" onclick="showPage('stats')">Stats</button>
    <button class="nav-btn" onclick="showPage('log')">Verlauf</button>
    <button class="nav-btn" onclick="showPage('plan')">Plan</button>
    <button class="nav-btn" onclick="showPage('settings')">Einst.</button>
  </div>
  <button class="nav-timer-btn" id="navTimerBtn" onclick="openTimer()">⏱ 1:30</button>
</div>

<!-- PAGES -->
<div id="today" class="page on"></div>
<div id="week" class="page"></div>
<div id="stats" class="page"></div>
<div id="log" class="page"></div>
<div id="plan" class="page"></div>
<div id="settings" class="page"></div>

<!-- TIMER OVERLAY -->
<div class="timer-overlay" id="timerOverlay" style="display:none">
  <div class="timer-box" style="position:relative">
    <button class="timer-close" onclick="closeTimer()">✕</button>
    <div class="timer-label">Pausen-Timer</div>
    <div class="timer-display" id="timerDisplay">1:30</div>
    <div class="timer-progress"><div class="timer-progress-fill" id="timerProgressFill" style="width:100%"></div></div>
    <div class="timer-presets">
      <button class="timer-preset" onclick="setTimer(45)">45s</button>
      <button class="timer-preset active" onclick="setTimer(90)">90s</button>
      <button class="timer-preset" onclick="setTimer(120)">2 Min</button>
      <button class="timer-preset" onclick="setTimer(180)">3 Min</button>
    </div>

  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}},
  del:(k)=>{try{localStorage.removeItem(k)}catch(e){}}
};

// ════════════════════════════════════════════════════
//  ISO WEEK (ISO-8601 konform)
// ════════════════════════════════════════════════════
function getWeekKey(offset=0){
  const d=new Date();
  d.setDate(d.getDate()+offset*7);
  d.setHours(0,0,0,0);
  // Donnerstag der Woche ermitteln – ISO 8601
  d.setDate(d.getDate()+4-(d.getDay()||7));
  const yearStart=new Date(d.getFullYear(),0,1);
  const weekNo=Math.ceil((((d-yearStart)/86400000)+1)/7);
  return `${d.getFullYear()}-W${String(weekNo).padStart(2,'0')}`;
}
function wkKey(di,wk){return`wk_${wk}_${di}`}
function doneKey(di,wk){return`done_${wk}_${di}`}

let weekOffset=0;
const todayIdx=(new Date().getDay()+6)%7;
let selectedDayIdx=todayIdx;

// ════════════════════════════════════════════════════
//  PACE
// ════════════════════════════════════════════════════
function calcPace(distKm,timeMins){
  if(!distKm||!timeMins||distKm<=0||timeMins<=0)return null;
  const dec=timeMins/distKm;
  return{str:`${Math.floor(dec)}:${String(Math.round((dec-Math.floor(dec))*60)).padStart(2,'0')}`,decimal:dec};
}
function paceCategory(dec){
  if(!dec)return{label:'–',pct:0};
  if(dec<=4)return{label:'Sehr schnell',pct:95};
  if(dec<=4.5)return{label:'Schnell',pct:80};
  if(dec<=5)return{label:'Gut',pct:65};
  if(dec<=5.5)return{label:'Flott',pct:55};
  if(dec<=6)return{label:'Moderat',pct:45};
  if(dec<=6.5)return{label:'Gemütlich',pct:35};
  if(dec<=7.5)return{label:'Locker',pct:25};
  return{label:'Spazieren',pct:15};
}

// ════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════
let toastTimer;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

// ════════════════════════════════════════════════════
//  PHASE
// ════════════════════════════════════════════════════
function getPhase(){
  let st=S.get('start_ts',null);
  if(!st){st=Date.now();S.set('start_ts',st)}
  const w=Math.floor((Date.now()-st)/(7*86400000));
  if(w<2)return{n:'Woche 1–2',desc:'Einstieg & Fundament',tip:'Technik vor Last. Konsistenz > Intensität.'};
  if(w<4)return{n:'Woche 3–4',desc:'Aufbau',tip:'Gewichte +5–10%. Laufdistanz auf 7 km.'};
  return{n:'Woche 5',desc:'Deload & Test',tip:'Volumen –30%. 5km-Zeit testen!'};
}

//  TIMER
// ════════════════════════════════════════════════════
let timerTotal=90,timerLeft=90,timerInterval=null,timerRunning=false;

function openTimer(){document.getElementById('timerOverlay').style.display='flex'}
function closeTimer(){document.getElementById('timerOverlay').style.display='none'}

function setTimer(secs){
  if(timerRunning)return;
  timerTotal=secs;timerLeft=secs;
  document.querySelectorAll('.timer-preset').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  updateTimerDisplay();
}

function toggleTimer(){
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('timerStartBtn').textContent='▶ Start';
    document.getElementById('navTimerBtn').classList.remove('running');
  } else {
    if(timerLeft<=0){timerLeft=timerTotal}
    timerRunning=true;
    document.getElementById('timerStartBtn').textContent='⏸ Pause';
    document.getElementById('navTimerBtn').classList.add('running');
    timerInterval=setInterval(()=>{
      timerLeft--;
      updateTimerDisplay();
      if(timerLeft<=0){
        clearInterval(timerInterval);timerRunning=false;
        document.getElementById('timerStartBtn').textContent='▶ Start';
        document.getElementById('navTimerBtn').classList.remove('running');
        document.getElementById('navTimerBtn').textContent='⏱ 0:00';
        // Vibrate if supported
        if(navigator.vibrate)navigator.vibrate([200,100,200]);
        toast('⏱ Pause beendet – weiter!');
      }
    },1000);
  }
}

function resetTimer(){
  clearInterval(timerInterval);timerRunning=false;
  timerLeft=timerTotal;
  document.getElementById('timerStartBtn').textContent='▶ Start';
  document.getElementById('navTimerBtn').classList.remove('running');
  updateTimerDisplay();
}

function updateTimerDisplay(){
  const m=Math.floor(timerLeft/60),s=timerLeft%60;
  const str=`${m}:${String(s).padStart(2,'0')}`;
  const disp=document.getElementById('timerDisplay');
  const fill=document.getElementById('timerProgressFill');
  const nav=document.getElementById('navTimerBtn');
  const pct=timerTotal>0?(timerLeft/timerTotal)*100:0;
  if(disp){
    disp.textContent=str;
    disp.className='timer-display'+(timerLeft<=10&&timerLeft>0?' danger-color':timerLeft<=0?' done-color':'');
  }
  if(fill){fill.style.width=pct+'%';fill.className='timer-progress-fill'+(timerLeft<=10?' danger-fill':'')}
  if(nav)nav.textContent=`⏱ ${str}`;
}

function renderToday(){
  const wk=getWeekKey(),day=PLAN[selectedDayIdx];
  const done=S.get(doneKey(selectedDayIdx,wk),false);
  const saved=S.get(wkKey(selectedDayIdx,wk),{});
  const phase=getPhase();
  const colors={upper:'var(--upper)',lower:'var(--lower)',run:'var(--run)',mob:'var(--mob)'};

  const miniGrid=PLAN.map((d,i)=>{
    const isDone=S.get(doneKey(i,wk),false);
    return`<div class="wday${isDone?' done':''}${i===selectedDayIdx?' selected':''}${i===todayIdx&&selectedDayIdx!==i?' today':''}" onclick="selectedDayIdx=${i};renderToday()">
      <div class="wday-label">${d.label}</div>
      <div class="wday-type" style="color:${colors[d.badge]}">${d.type.split(' ')[0]}</div>
      <div class="wday-dot"></div>
    </div>`;
  }).join('');

  // Progress ring
  let pct=0,doneCount=0,total=0;
  if(day.exercises){
    total=day.exercises.length;
    doneCount=day.exercises.filter((_,j)=>saved[j]?.kg||saved[j]?.reps).length;
    pct=total>0?Math.round(doneCount/total*100):0;
  } else if(day.mobility){
    total=day.mobility.length;
    const mc=S.get(wkKey(selectedDayIdx,wk)+'_mob',{});
    doneCount=Object.keys(mc).length;
    pct=total>0?Math.round(doneCount/total*100):0;
  } else if(day.run){
    pct=saved.run?.dist?100:0;
  }

  const r=36,circ=2*Math.PI*r,fill=circ*(1-pct/100);
  const ringColor=done?'var(--run)':pct>0?'var(--upper)':'var(--border2)';

  let bodyHTML='';
  if(day.run) bodyHTML=renderRunFields(selectedDayIdx,wk,saved,day.interval);
  else if(day.mobility){
    const mc=S.get(wkKey(selectedDayIdx,wk)+'_mob',{});
    bodyHTML=`<div class="mob-list">${day.mobility.map((m,i)=>`
      <div class="mob-item${mc[i]?' checked':''}" onclick="toggleMob(${selectedDayIdx},${i})">
        <div class="mob-check">${mc[i]?'✓':''}</div>
        <div><div class="mob-name">${m.name}</div><div class="mob-meta">${m.meta}</div></div>
      </div>`).join('')}</div>`;
  } else if(day.exercises){
    bodyHTML=renderExerciseTable(selectedDayIdx,wk,saved,day.exercises);
  }

  document.getElementById('today').innerHTML=`
    <div class="phase-banner">
      <span class="phase-icon">📈</span>
      <div><div class="phase-text">${phase.n}: ${phase.desc}</div><div class="phase-sub">${phase.tip}</div></div>
    </div>
    <div class="slabel">Diese Woche</div>
    <div class="week-grid">${miniGrid}</div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <span>${day.icon}</span><span>${day.type}</span>
          <span class="badge b-${day.badge}">${{upper:'Oberkörper',lower:'Unterkörper',run:'Laufen',mob:'Mobility'}[day.badge]}</span>
        </div>
        <div class="ring-wrap">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="${r}" fill="none" stroke="var(--bg4)" stroke-width="6"/>
            <circle cx="40" cy="40" r="${r}" fill="none" stroke="${ringColor}" stroke-width="6"
              stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${fill.toFixed(2)}" stroke-linecap="round"/>
          </svg>
          <div class="ring-center">
            <div class="ring-n">${pct}%</div>
            <div class="ring-l">${day.run?'Bereit':doneCount+'/'+total}</div>
          </div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--muted2);margin-bottom:14px;font-weight:500">${day.sub}</div>
      ${bodyHTML}
      <button class="done-btn${done?' marked':''}" onclick="toggleDone(${selectedDayIdx})">
        ${done?'✓ Einheit abgeschlossen':'Als abgeschlossen markieren'}
      </button>
    </div>
    ${renderPrevValues(selectedDayIdx)}`;
}

      </div>

        <label>HF Ø (bpm)</label>
        <input type="number" inputmode="numeric" placeholder="145"
          value="${rd.hr||''}" class="${rd.hr?'has-val':''}"
          onfocus="this.select()" oninput="saveRun(${dayIdx},'hr',this.value)">
      </div>
    </div>
    <div class="run-grid" style="grid-template-columns:1fr 1fr;margin-top:0">
      <div class="run-field">
        <label>Kalorien (kcal)</label>

function updatePaceDisplay(dayIdx){
  const dist=parseFloat(document.getElementById('run_dist_'+dayIdx)?.value)||0;
  const time=parseFloat(document.getElementById('run_time_'+dayIdx)?.value)||0;
  const pace=calcPace(dist,time);
  const cat=paceCategory(pace?.decimal);
  const pv=document.getElementById('pace_val_'+dayIdx);
  const fill=document.getElementById('pace_fill_'+dayIdx);
  const catEl=document.getElementById('pace_cat_'+dayIdx);
  if(pv)pv.textContent=pace?pace.str:'—:——';
  if(fill)fill.style.width=cat.pct+'%';
  if(catEl)catEl.textContent=cat.label;
}

// ── Prev Values ───────────────────────────────────
function renderPrevValues(dayIdx){
  const prevWk=getWeekKey(-1),day=PLAN[dayIdx];
  const prev=S.get(wkKey(dayIdx,prevWk),{});
  const curr=S.get(wkKey(dayIdx,getWeekKey()),{});

  // All-time PRs
  const prMap={};
  for(let w=0;w>=-20;w--){
    const d=S.get(wkKey(dayIdx,getWeekKey(w)),{});
    day.exercises?.forEach((_,j)=>{const kg=parseFloat(d[j]?.kg);if(kg&&(!prMap[j]||kg>prMap[j]))prMap[j]=kg});
  }

  if(day.run){
    const pr=prev.run||{};
    if(!pr.dist&&!pr.time)return`<div class="empty">Noch keine Vorwochenwerte</div>`;
    const pp=calcPace(parseFloat(pr.dist),parseFloat(pr.time));
    const cp=calcPace(parseFloat(curr.run?.dist),parseFloat(curr.run?.time));
    return`<div class="prev-header"><span class="prev-title">Vorwoche</span></div>
      <div class="card-sm">
        ${pr.dist?`<div class="prev-row"><span class="prev-key">Distanz</span><span class="prev-val">${pr.dist} km</span></div>`:''}
        ${pr.time?`<div class="prev-row"><span class="prev-key">Zeit</span><span class="prev-val">${pr.time} Min</span></div>`:''}
        ${pp?`<div class="prev-row"><span class="prev-key">Pace</span><span class="prev-val">${pp.str} min/km${(cp&&cp.decimal<pp.decimal)?'<span class="pr-tag">schneller</span>':''}</span></div>`:''}
        ${pr.hr?`<div class="prev-row"><span class="prev-key">HF Ø</span><span class="prev-val">${pr.hr} bpm</span></div>`:''}
      </div>`;
  }
  if(!day.exercises)return'';
  const hasAny=day.exercises.some((_,j)=>prev[j]?.kg||prev[j]?.reps);
  if(!hasAny)return`<div class="empty">Noch keine Vorwochenwerte</div>`;
  return`<div class="prev-header"><span class="prev-title">Vorwoche</span><span class="prev-badge">Vergleich</span></div>
    <div class="card-sm">
      ${day.exercises.map((ex,j)=>{
        const p=prev[j];if(!p||(!p.kg&&!p.reps))return'';
        const currKg=parseFloat(curr[j]?.kg);
        const isPR=currKg&&currKg>=(prMap[j]||0)&&currKg>parseFloat(p.kg||0);
        return`<div class="prev-row">
          <span class="prev-key">${ex.name}</span>
          <span class="prev-val">${p.kg?p.kg+' kg ':''} ${p.reps?'×'+p.reps:''} ${p.sets?p.sets+'S':''}${isPR?'<span class="pr-tag">PR</span>':''}</span>
        </div>`;
      }).join('')}
    </div>`;
}

// ── Save helpers ──────────────────────────────────
function saveEx(di,j,field,val){
  const wk=getWeekKey(),key=wkKey(di,wk),d=S.get(key,{});
  if(!d[j])d[j]={};d[j][field]=val;S.set(key,d);
}
function saveRun(di,field,val){
  const wk=getWeekKey(),key=wkKey(di,wk),d=S.get(key,{});
  if(!d.run)d.run={};d.run[field]=val;S.set(key,d);
}
function toggleMob(di,i){
  const wk=getWeekKey(),key=wkKey(di,wk)+'_mob',d=S.get(key,{});
  if(d[i])delete d[i];else d[i]=true;S.set(key,d);renderToday();
}
function toggleDone(di){
  const wk=getWeekKey(),key=doneKey(di,wk),curr=S.get(key,false);
  S.set(key,!curr);toast(!curr?'✓ Einheit abgeschlossen!':'Markierung entfernt');renderToday();
}

// ════════════════════════════════════════════════════
//  WEEK PAGE
// ════════════════════════════════════════════════════
function renderWeek(){
  const wk=getWeekKey(weekOffset);
  const doneDays=PLAN.filter((_,i)=>S.get(doneKey(i,wk),false));
  const pct=Math.round(doneDays.length/PLAN.length*100);
  const bgColors={upper:'var(--upper-bg)',lower:'var(--lower-bg)',run:'var(--run-bg)',mob:'var(--mob-bg)'};

  const cards=PLAN.map((day,i)=>{
    const done=S.get(doneKey(i,wk),false);
    const saved=S.get(wkKey(i,wk),{});
    let detail='';
    if(day.run&&saved.run?.dist){
      const p=calcPace(parseFloat(saved.run.dist),parseFloat(saved.run.time));
      detail=`${saved.run.dist} km${p?' · '+p.str+' /km':''}${saved.run.feel?' · '+['😫','😔','😐','😊','🔥'][saved.run.feel-1]:''}`;
    } else if(day.exercises){
      const f=day.exercises.filter((_,j)=>saved[j]?.kg).length;
      if(f)detail=`${f}/${day.exercises.length} Übungen mit Gewicht`;
    } else if(day.mobility){
      const mc=S.get(wkKey(i,wk)+'_mob',{});
      const c=Object.keys(mc).length;if(c)detail=`${c}/${day.mobility.length} erledigt`;
    }
    return`<div class="day-summary-card${done?' done-card':''}" onclick="selectedDayIdx=${i};showPage('today')">
      <div class="day-icon" style="background:${bgColors[day.badge]}">${day.icon}</div>
      <div class="day-info">
        <div class="day-name">${day.label} — ${day.type}</div>
        <div class="day-sub">${detail||day.sub}</div>
      </div>
      <div>${done?'<span class="day-status">✓</span>':i===todayIdx&&weekOffset===0?'<span style="font-size:10px;color:var(--upper);font-weight:700;border:1px solid var(--upper);padding:2px 7px;border-radius:10px">Heute</span>':''}</div>
    </div>`;
  }).join('');

  document.getElementById('week').innerHTML=`
    <div class="week-sel">
      <button class="week-nav" onclick="weekOffset--;renderWeek()">‹</button>
      <span class="week-label">${weekOffset===0?'Diese Woche':weekOffset===-1?'Letzte Woche':`Vor ${-weekOffset} Wochen`}</span>
      <button class="week-nav" onclick="weekOffset=Math.min(0,weekOffset+1);renderWeek()" ${weekOffset>=0?'disabled':''}>›</button>
    </div>
    <div class="card">
      <div class="prog-wrap">
        <div class="prog-lbl"><span>Wochenfortschritt</span><span>${doneDays.length}/${PLAN.length} · ${pct}%</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--run),var(--upper))"></div></div>
      </div>
    </div>
    <div class="slabel">Einheiten</div>${cards}`;
}

// ════════════════════════════════════════════════════
//  STATS PAGE
// ════════════════════════════════════════════════════
function renderStats(){
  let totalSessions=0,totalKm=0,totalMin=0,bestPace=null,bestDist=0;
  const weeklyData=[],prMap={};

  for(let w=0;w>=-16;w--){
    const wk=getWeekKey(w);
    let ws=0;
    PLAN.forEach((_,i)=>{if(S.get(doneKey(i,wk),false)){totalSessions++;ws++}});
    weeklyData.push(ws);
    [1,4].forEach(i=>{
      const d=S.get(wkKey(i,wk),{});
      if(d.run?.dist){
        const km=parseFloat(d.run.dist)||0,min=parseFloat(d.run.time)||0;
        totalKm+=km;totalMin+=min;if(km>bestDist)bestDist=km;
        const p=calcPace(km,min);if(p&&(!bestPace||p.decimal<bestPace.decimal))bestPace=p;
      }
    });
    PLAN.filter(d=>!d.run&&!d.mobility).forEach(day=>{
      const ri=PLAN.indexOf(day),sv=S.get(wkKey(ri,wk),{});
      day.exercises?.forEach((ex,j)=>{const kg=parseFloat(sv[j]?.kg);if(kg&&(!prMap[ex.name]||kg>prMap[ex.name]))prMap[ex.name]=kg});
    });
  }

  const last8=weeklyData.reverse().slice(-8);
  const maxW=Math.max(...last8,1);
  const weekLabels=['W-7','W-6','W-5','W-4','W-3','W-2','VW','DW'];
  const barChart=last8.map((n,i)=>`
    <div class="bar-col">
      <div class="bar-inner${n>0?' filled':''}" style="height:${Math.round(n/maxW*60)+8}px"></div>
      <div class="bar-lbl">${weekLabels[i]||''}</div>
    </div>`).join('');

  const prEntries=Object.entries(prMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxKg=prEntries[0]?.[1]||100;
  const avgPace=calcPace(totalKm,totalMin);

  document.getElementById('stats').innerHTML=`
    <div class="slabel">Gesamt</div>
    <div class="stats-big-grid">
      <div class="stat-big"><div class="stat-big-n" style="color:var(--upper)">${totalSessions}</div><div class="stat-big-l">Einheiten</div><div class="stat-big-sub">letzte 16 Wochen</div></div>
      <div class="stat-big"><div class="stat-big-n" style="color:var(--run)">${totalKm.toFixed(1)}</div><div class="stat-big-l">km gelaufen</div><div class="stat-big-sub">${bestDist?'Best: '+bestDist.toFixed(1)+' km':''}</div></div>
      <div class="stat-big"><div class="stat-big-n" style="color:var(--mob)">${bestPace?bestPace.str:'—'}</div><div class="stat-big-l">Beste Pace</div><div class="stat-big-sub">${avgPace?'Ø '+avgPace.str+' /km':''}</div></div>
      <div class="stat-big"><div class="stat-big-n" style="color:var(--lower)">${totalMin>0?(totalMin/60).toFixed(1):'—'}</div><div class="stat-big-l">Laufstunden</div><div class="stat-big-sub">${totalKm>0?'~'+Math.round(totalKm*70)+' kcal':''}</div></div>
    </div>
    <div class="slabel">Wochenaktivität</div>
    <div class="card"><div class="chart-bars">${barChart}</div></div>
    <div class="slabel">Persönliche Bestleistungen</div>
    <div class="card">
      ${prEntries.length?prEntries.map(([name,kg])=>`
        <div class="pr-item">
          <div class="pr-name">${name}</div>
          <div class="pr-bar-wrap"><div class="mini-bar"><div class="mini-fill" style="width:${Math.round(kg/maxKg*100)}%"></div></div></div>
          <div class="pr-val">${kg} kg</div>
        </div>`).join(''):'<div class="empty">Noch keine Gewichte eingetragen</div>'}
    </div>`;
}

// ════════════════════════════════════════════════════
//  LOG PAGE
// ════════════════════════════════════════════════════
function renderLog(){
  let entries=[];
  for(let w=0;w>=-16;w--){
    const wk=getWeekKey(w);
    PLAN.forEach((day,i)=>{
      if(S.get(doneKey(i,wk),false))entries.push({wk,w,day,i,saved:S.get(wkKey(i,wk),{})});
    });
  }
  entries.reverse();
  if(!entries.length){document.getElementById('log').innerHTML='<div class="empty" style="margin-top:60px">📋<br><br>Noch keine abgeschlossenen Einheiten</div>';return}

  document.getElementById('log').innerHTML=`<div class="slabel">Alle Einheiten</div>`+entries.map(e=>{
    const d=e.day,sv=e.saved;let rows='';
    if(d.run&&sv.run){
      const r=sv.run,p=calcPace(parseFloat(r.dist),parseFloat(r.time));
      rows=[
        r.dist?`<div class="log-row"><span class="log-key">Distanz</span><span class="log-val">${r.dist} km</span></div>`:'',
        r.time?`<div class="log-row"><span class="log-key">Zeit</span><span class="log-val">${r.time} Min</span></div>`:'',
        p?`<div class="log-row"><span class="log-key">Pace</span><span class="log-val">${p.str} min/km</span></div>`:'',
        r.hr?`<div class="log-row"><span class="log-key">HF Ø</span><span class="log-val">${r.hr} bpm</span></div>`:'',
        r.kcal?`<div class="log-row"><span class="log-key">Kalorien</span><span class="log-val">${r.kcal} kcal</span></div>`:'',
        r.feel?`<div class="log-row"><span class="log-key">Gefühl</span><span class="log-val">${['😫','😔','😐','😊','🔥'][r.feel-1]}</span></div>`:'',
        r.notes?`<div class="log-row" style="flex-direction:column;align-items:flex-start;gap:3px"><span class="log-key">Notizen</span><span style="font-size:12px;color:var(--muted2);margin-top:2px">${r.notes}</span></div>`:''
      ].join('');
    } else if(d.exercises){
      rows=d.exercises.map((ex,j)=>{
        const s=sv[j];if(!s||(!s.kg&&!s.reps))return'';
        return`<div class="log-row"><span class="log-key">${ex.name}</span><span class="log-val">${s.kg?s.kg+' kg':''} ${s.reps?'×'+s.reps:''} ${s.sets?'('+s.sets+'S)':''}</span></div>`;
      }).join('');
    } else if(d.mobility){
      const mc=S.get(wkKey(e.i,e.wk)+'_mob',{});
      const c=Object.keys(mc).length;
      if(c)rows=`<div class="log-row"><span class="log-key">Erledigt</span><span class="log-val">${c}/${d.mobility.length}</span></div>`;
    }
    const wLabel=e.w===0?'Diese Woche':e.w===-1?'Letzte Woche':`Vor ${-e.w} Wochen`;
    return`<div class="log-entry">
      <div class="log-date">
        <span class="log-when">${d.label} – ${d.type}</span>
        <span class="badge b-${d.badge}">${wLabel}</span>
      </div>
      ${rows||'<div style="color:var(--muted);font-size:12px">Keine Details</div>'}
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════
//  EXPORT / IMPORT
// ════════════════════════════════════════════════════
function exportData(){
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    try{data[k]=JSON.parse(localStorage.getItem(k))}catch(e){data[k]=localStorage.getItem(k)}
  }
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`trainingsplan_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('✓ Daten exportiert!');
}

function importData(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      Object.keys(data).forEach(k=>{
        localStorage.setItem(k,typeof data[k]==='object'?JSON.stringify(data[k]):data[k]);
      });
      toast('✓ Daten erfolgreich importiert!');
      setTimeout(()=>location.reload(),1000);
    }catch(err){
      toast('❌ Fehler beim Parsen der Datei');
    }
  };
  reader.readAsText(file);
  // Reset input so same file can be re-selected
  event.target.value='';
}
